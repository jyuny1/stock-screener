name: Static Site

on:
  workflow_dispatch:

concurrency:
  group: static-site-us
  cancel-in-progress: true

permissions:
  contents: write
  deployments: write

jobs:
  publish-us:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    env:
      STATIC_DATA_DIR: frontend/public/static-data

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Download weekly reference artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/weekly-reference
          gh release download weekly-reference-data \
            --repo "${{ github.repository }}" \
            --pattern weekly-reference-latest-us.json \
            --dir /tmp/weekly-reference \
            --clobber

          BUNDLE_ASSET_NAME="$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('/tmp/weekly-reference/weekly-reference-latest-us.json').read_text(encoding='utf-8'))
          coverage = manifest.get('coverage') or {}
          if manifest.get('market') != 'US':
              raise SystemExit(f"weekly manifest market must be US, got {manifest.get('market')!r}")
          if coverage.get('universe_mode') != 'US_OPTIONABLE':
              raise SystemExit(f"weekly manifest must use US_OPTIONABLE, got {coverage.get('universe_mode')!r}")
          if int(coverage.get('active_symbols') or 0) < 3000:
              raise SystemExit(f"weekly manifest active_symbols too low: {coverage.get('active_symbols')}")
          if int(coverage.get('missing_active_symbols') or 0) != 0:
              raise SystemExit(f"weekly manifest has missing active symbols: {coverage.get('missing_active_symbols')}")
          print(manifest['bundle_asset_name'])
          PY
          )"
          echo "WEEKLY_REFERENCE_BUNDLE=/tmp/weekly-reference/${BUNDLE_ASSET_NAME}" >> "$GITHUB_ENV"
          echo "WEEKLY_REFERENCE_SHA256=$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('/tmp/weekly-reference/weekly-reference-latest-us.json').read_text(encoding='utf-8'))['sha256'])
          PY
          )" >> "$GITHUB_ENV"

          gh release download weekly-reference-data \
            --repo "${{ github.repository }}" \
            --pattern "${BUNDLE_ASSET_NAME}" \
            --dir /tmp/weekly-reference \
            --clobber

      - name: Verify weekly reference checksum
        run: |
          set -euo pipefail
          digest="$(python - <<'PY'
          import hashlib, os
          from pathlib import Path
          print(hashlib.sha256(Path(os.environ['WEEKLY_REFERENCE_BUNDLE']).read_bytes()).hexdigest())
          PY
          )"
          if [ "$digest" != "$WEEKLY_REFERENCE_SHA256" ]; then
            echo "Weekly reference checksum mismatch: $digest != $WEEKLY_REFERENCE_SHA256" >&2
            exit 1
          fi

      - name: Download optional daily price artifact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/daily-price
          gh release download daily-price-data \
            --repo "${{ github.repository }}" \
            --pattern daily-price-latest-us.json \
            --dir /tmp/daily-price \
            --clobber

          BUNDLE_ASSET_NAME="$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('/tmp/daily-price/daily-price-latest-us.json').read_text(encoding='utf-8'))
          if manifest.get('market') != 'US':
              raise SystemExit(f"daily manifest market must be US, got {manifest.get('market')!r}")
          print(manifest['bundle_asset_name'])
          PY
          )"
          echo "DAILY_PRICE_BUNDLE=/tmp/daily-price/${BUNDLE_ASSET_NAME}" >> "$GITHUB_ENV"
          echo "DAILY_PRICE_SHA256=$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('/tmp/daily-price/daily-price-latest-us.json').read_text(encoding='utf-8'))['sha256'])
          PY
          )" >> "$GITHUB_ENV"

          gh release download daily-price-data \
            --repo "${{ github.repository }}" \
            --pattern "${BUNDLE_ASSET_NAME}" \
            --dir /tmp/daily-price \
            --clobber

      - name: Verify optional daily price checksum
        if: ${{ env.DAILY_PRICE_BUNDLE != '' }}
        run: |
          set -euo pipefail
          digest="$(python - <<'PY'
          import hashlib, os
          from pathlib import Path
          print(hashlib.sha256(Path(os.environ['DAILY_PRICE_BUNDLE']).read_bytes()).hexdigest())
          PY
          )"
          if [ "$digest" != "$DAILY_PRICE_SHA256" ]; then
            echo "Daily price checksum mismatch: $digest != $DAILY_PRICE_SHA256" >&2
            exit 1
          fi

      - name: Build static data from artifacts
        run: |
          set -euo pipefail
          rm -rf "$STATIC_DATA_DIR"
          args=(
            --weekly-reference "$WEEKLY_REFERENCE_BUNDLE"
            --output-dir "../$STATIC_DATA_DIR"
          )
          if [ -n "${DAILY_PRICE_BUNDLE:-}" ]; then
            args+=(--daily-price "$DAILY_PRICE_BUNDLE")
          fi
          cd backend
          python -m app.scripts.build_static_site_from_artifacts "${args[@]}"

      - name: Validate static data contract
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('frontend/public/static-data')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          assert manifest['schema_version'] == 'static-site-v2'
          assert manifest['default_market'] == 'US'
          scan_path = root / manifest['markets']['US']['pages']['scan']['path']
          scan = json.loads(scan_path.read_text(encoding='utf-8'))
          assert scan['schema_version'] == 'static-scan-v1'
          assert scan['rows_total'] >= 3000
          assert scan['initial_rows']
          required = {'symbol', 'company_name', 'market', 'composite_score', 'volume', 'market_cap', 'gics_sector'}
          missing = required - set(scan['initial_rows'][0])
          if missing:
              raise SystemExit(f'missing required scan row fields: {sorted(missing)}')
          for chunk in scan['chunks']:
              path = root / chunk['path']
              if not path.exists():
                  raise SystemExit(f'missing scan chunk: {path}')
          print({'rows_total': scan['rows_total'], 'chunks': len(scan['chunks'])})
          PY

      - name: Build static frontend
        env:
          VITE_STATIC_SITE: "true"
          VITE_BASE_PATH: /
          VITE_STATIC_DATA_BASE_URL: ${{ vars.STATIC_DATA_BASE_URL }}
        run: cd frontend && npm run build

      - name: Validate Cloudflare deployment configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          STATIC_DATA_BASE_URL: ${{ vars.STATIC_DATA_BASE_URL }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          missing=0
          for name in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            R2_ACCESS_KEY_ID \
            R2_SECRET_ACCESS_KEY \
            R2_BUCKET \
            STATIC_DATA_BASE_URL \
            CLOUDFLARE_PAGES_PROJECT; do
            if [ -z "${!name}" ]; then
              echo "Missing required Cloudflare deployment setting: ${name}" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Upload static data to Cloudflare R2
        env:
          R2_BUCKET: ${{ vars.R2_BUCKET }}
        run: |
          rclone sync frontend/public/static-data/ "r2:${R2_BUCKET}/static-data" \
            --s3-no-check-bucket \
            --checksum \
            --delete-during \
            --transfers 8 \
            --checkers 16

      - name: Strip static-data from Pages bundle
        run: rm -rf frontend/dist/static-data

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
