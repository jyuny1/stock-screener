name: Static Site

on:
  workflow_dispatch:
    inputs:
      deployment_mode:
        description: "production requires all artifacts; preview allows missing non-core artifacts."
        required: false
        type: choice
        default: production
        options:
          - production
          - preview
      pipeline_manifest_asset:
        description: "Optional pipeline-run-manifest asset to pin artifact bundle names and sha256 values."
        required: false
        type: string
        default: ''
      option_contract_d1_database_name:
        description: "Optional D1 database name override for option-chain import."
        required: false
        type: string
        default: ''
      option_contract_d1_database_id:
        description: "Optional D1 database id override for audit/logging."
        required: false
        type: string
        default: ''

concurrency:
  # Serialize Schwab-backed static builds to avoid avoidable broker/API bursts.
  group: schwab-token-broker
  cancel-in-progress: false

permissions:
  contents: write
  deployments: write
  actions: write
  id-token: write

jobs:
  build-static-data:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    env:
      STATIC_DATA_DIR: frontend/public/static-data
      STATIC_SITE_DEPLOYMENT_MODE: ${{ inputs.deployment_mode || 'production' }}
      PIPELINE_MANIFEST_ASSET: ${{ inputs.pipeline_manifest_asset || '' }}
      SCHWAB_TOKEN_BROKER_URL: ${{ vars.SCHWAB_TOKEN_BROKER_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download pipeline run manifest if provided
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$PIPELINE_MANIFEST_ASSET" ]; then
            echo "No pipeline-run-manifest asset provided; static site will resolve latest artifacts."
            exit 0
          fi
          mkdir -p /tmp/pipeline-run-manifest
          gh release download pipeline-run-manifest \
            --repo "${{ github.repository }}" \
            --pattern "$PIPELINE_MANIFEST_ASSET" \
            --dir /tmp/pipeline-run-manifest \
            --clobber
          echo "PIPELINE_MANIFEST_PATH=/tmp/pipeline-run-manifest/${PIPELINE_MANIFEST_ASSET}" >> "$GITHUB_ENV"

      - name: Download artifact inputs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          require_artifact() {
            local key="$1" release="$2" manifest="$3" dir="$4" env_prefix="$5"
            mkdir -p "$dir"
            local bundle sha manifest_path
            if [ -n "${PIPELINE_MANIFEST_PATH:-}" ]; then
              bundle="$(python scripts/read_pipeline_manifest.py "$PIPELINE_MANIFEST_PATH" "$key" bundle_asset_name)"
              sha="$(python scripts/read_pipeline_manifest.py "$PIPELINE_MANIFEST_PATH" "$key" sha256)"
              manifest_path="$dir/$manifest"
              gh release download "$release" --repo "${{ github.repository }}" --pattern "$manifest" --dir "$dir" --clobber
            else
              gh release download "$release" --repo "${{ github.repository }}" --pattern "$manifest" --dir "$dir" --clobber
              manifest_path="$dir/$manifest"
              bundle="$(python - <<PY
          import json
          from pathlib import Path
          payload = json.loads(Path('$manifest_path').read_text(encoding='utf-8'))
          if payload.get('market') != 'US':
              raise SystemExit(f"$release manifest market must be US, got {payload.get('market')!r}")
          print(payload['bundle_asset_name'])
          PY
              )"
              sha="$(python - <<PY
          import json
          from pathlib import Path
          print(json.loads(Path('$manifest_path').read_text(encoding='utf-8'))['sha256'])
          PY
              )"
            fi
            gh release download "$release" --repo "${{ github.repository }}" --pattern "$bundle" --dir "$dir" --clobber
            echo "${env_prefix}_BUNDLE=${dir}/${bundle}" >> "$GITHUB_ENV"
            echo "${env_prefix}_SHA256=${sha}" >> "$GITHUB_ENV"
            echo "${env_prefix}_MANIFEST=${manifest_path}" >> "$GITHUB_ENV"
          }

          optional_artifact() {
            local key="$1" release="$2" manifest="$3" dir="$4" env_prefix="$5"
            if require_artifact "$key" "$release" "$manifest" "$dir" "$env_prefix"; then
              return 0
            fi
            if [ "$STATIC_SITE_DEPLOYMENT_MODE" = "production" ]; then
              echo "Required production artifact missing or invalid: $release/$manifest" >&2
              return 1
            fi
            echo "Preview mode: missing optional artifact ignored: $release/$manifest" >&2
            return 0
          }

          require_artifact foundation_update foundation-update-data foundation-update-latest-us.json /tmp/foundation-update FOUNDATION_UPDATE
          require_artifact daily_price daily-price-data daily-price-latest-us.json /tmp/daily-price DAILY_PRICE
          require_artifact scan_metrics scan-metrics-data scan-metrics-latest-us.json /tmp/scan-metrics SCAN_METRICS
          optional_artifact group_rank group-rank-data group-rank-latest-us.json /tmp/group-rank GROUP_RANK
          optional_artifact listing_profile listing-profile-data listing-profile-latest-us.json /tmp/listing-profile LISTING_PROFILE
          optional_artifact etf_profile etf-profile-data etf-profile-latest-us.json /tmp/etf-profile ETF_PROFILE

      - name: Validate artifact checksums and contracts
        run: |
          set -euo pipefail
          verify() {
            local path="$1" expected="$2" label="$3"
            if [ -z "$path" ]; then return 0; fi
            digest="$(python - <<PY
          import hashlib
          from pathlib import Path
          print(hashlib.sha256(Path('$path').read_bytes()).hexdigest())
          PY
            )"
            if [ "$digest" != "$expected" ]; then
              echo "$label checksum mismatch: $digest != $expected" >&2
              exit 1
            fi
          }
          verify "$FOUNDATION_UPDATE_BUNDLE" "$FOUNDATION_UPDATE_SHA256" foundation-update
          verify "$DAILY_PRICE_BUNDLE" "$DAILY_PRICE_SHA256" daily-price
          verify "$SCAN_METRICS_BUNDLE" "$SCAN_METRICS_SHA256" scan-metrics
          verify "${GROUP_RANK_BUNDLE:-}" "${GROUP_RANK_SHA256:-}" group-rank
          verify "${LISTING_PROFILE_BUNDLE:-}" "${LISTING_PROFILE_SHA256:-}" listing-profile
          verify "${ETF_PROFILE_BUNDLE:-}" "${ETF_PROFILE_SHA256:-}" etf-profile

          python - <<'PY'
          import json, os
          from pathlib import Path
          foundation = json.loads(Path(os.environ['FOUNDATION_UPDATE_MANIFEST']).read_text(encoding='utf-8'))
          coverage = foundation.get('coverage') or {}
          if foundation.get('market') != 'US':
              raise SystemExit('foundation update manifest market must be US')
          if coverage.get('universe_mode') != 'US_OPTIONABLE':
              raise SystemExit(f"foundation universe must be US_OPTIONABLE, got {coverage.get('universe_mode')!r}")
          if int(coverage.get('active_symbols') or 0) < 3000:
              raise SystemExit(f"foundation active_symbols too low: {coverage.get('active_symbols')}")
          if int(coverage.get('missing_active_symbols') or 0) != 0:
              raise SystemExit(f"foundation missing active symbols: {coverage.get('missing_active_symbols')}")
          daily = json.loads(Path(os.environ['DAILY_PRICE_MANIFEST']).read_text(encoding='utf-8'))
          if daily.get('market') != 'US' or float(daily.get('symbol_coverage') or 0) < 0.80:
              raise SystemExit(f"daily price contract failed: {daily}")
          scan = json.loads(Path(os.environ['SCAN_METRICS_MANIFEST']).read_text(encoding='utf-8'))
          if scan.get('market') != 'US' or float(scan.get('symbol_coverage') or 0) < 0.80:
              raise SystemExit(f"scan metrics contract failed: {scan}")
          print({
              'deployment_mode': os.environ.get('STATIC_SITE_DEPLOYMENT_MODE'),
              'pinned_pipeline_manifest': os.environ.get('PIPELINE_MANIFEST_ASSET') or None,
              'foundation_symbols': coverage.get('active_symbols'),
              'daily_coverage': daily.get('symbol_coverage'),
              'scan_coverage': scan.get('symbol_coverage'),
          })
          PY

      - name: Request Schwab access token from broker
        run: |
          set -euo pipefail
          if [ -z "${SCHWAB_TOKEN_BROKER_URL:-}" ]; then
            echo "Missing SCHWAB_TOKEN_BROKER_URL; cannot fetch Schwab option chain liquidity." >&2
            exit 1
          fi
          oidc_token="$(curl -fsSL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=schwab-token-broker" \
            | jq -r '.value')"
          response="$(curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${oidc_token}" \
            -H "Accept: application/json" \
            "${SCHWAB_TOKEN_BROKER_URL%/}/v1/schwab/access-token")"
          access_token="$(printf '%s' "$response" | jq -r '.access_token')"
          if [ -z "$access_token" ] || [ "$access_token" = "null" ]; then
            echo "Schwab token broker response did not include access_token" >&2
            exit 1
          fi
          echo "::add-mask::${access_token}"
          echo "SCHWAB_ACCESS_TOKEN=${access_token}" >> "$GITHUB_ENV"

      - name: Build static data and fetch option chain liquidity
        env:
          STATIC_DATA_BASE_URL: ${{ vars.STATIC_DATA_BASE_URL }}
        run: |
          set -euo pipefail
          rm -rf "$STATIC_DATA_DIR"
          args=(
            --foundation-update "$FOUNDATION_UPDATE_BUNDLE"
            --daily-price "$DAILY_PRICE_BUNDLE"
            --scan-metrics "$SCAN_METRICS_BUNDLE"
            --output-dir "../$STATIC_DATA_DIR"
          )
          if [ -n "${GROUP_RANK_BUNDLE:-}" ]; then args+=(--group-rank "$GROUP_RANK_BUNDLE"); fi
          if [ -n "${LISTING_PROFILE_BUNDLE:-}" ]; then args+=(--listing-profile "$LISTING_PROFILE_BUNDLE"); fi
          if [ -n "${ETF_PROFILE_BUNDLE:-}" ]; then args+=(--etf-profile "$ETF_PROFILE_BUNDLE"); fi
          cd backend
          python -u -m app.scripts.build_static_site_from_artifacts "${args[@]}"

      - name: Upload raw static data artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-data-raw-us
          path: frontend/public/static-data
          if-no-files-found: error
          retention-days: 2
          overwrite: true

  import-option-d1:
    needs: build-static-data
    runs-on: ubuntu-latest
    env:
      STATIC_DATA_DIR: frontend/public/static-data

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download raw static data artifact
        uses: actions/download-artifact@v4
        with:
          name: static-data-raw-us
          path: frontend/public/static-data

      - name: Validate option chain D1 workflow settings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPTION_CONTRACT_D1_DATABASE_NAME: ${{ inputs.option_contract_d1_database_name || vars.OPTION_CONTRACT_D1_DATABASE_NAME }}
          OPTION_CONTRACT_D1_DATABASE_ID: ${{ inputs.option_contract_d1_database_id || vars.OPTION_CONTRACT_D1_DATABASE_ID }}
        run: |
          set -euo pipefail
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID OPTION_CONTRACT_D1_DATABASE_NAME; do
            if [ -z "${!name}" ]; then
              echo "Missing required option chain D1 workflow setting: ${name}" >&2
              missing=1
            fi
          done
          echo "Option D1 target: ${OPTION_CONTRACT_D1_DATABASE_NAME} (${OPTION_CONTRACT_D1_DATABASE_ID:-id not provided})"
          exit "$missing"

      - name: Import fetched option chain liquidity into D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPTION_CONTRACT_D1_DATABASE_NAME: ${{ inputs.option_contract_d1_database_name || vars.OPTION_CONTRACT_D1_DATABASE_NAME }}
        run: |
          set -euo pipefail
          alter_column() {
            local column_name="$1"
            local column_type="$2"
            if ! npx --yes wrangler@latest d1 execute "$OPTION_CONTRACT_D1_DATABASE_NAME" --remote --command \
              "ALTER TABLE option_contract_liquidity_snapshots ADD COLUMN ${column_name} ${column_type}"; then
              echo "Column ${column_name} may already exist; continuing."
            fi
          }
          alter_column theta REAL
          alter_column theta_yield_pct REAL
          alter_column spread_pct REAL
          alter_column roc_pct REAL
          sql_file="frontend/public/static-data/markets/us/options/option-contract-liquidity-d1.sql"
          test -s "$sql_file"
          snapshot_insert_count="$(grep -c "INSERT OR REPLACE INTO option_contract_liquidity_snapshots" "$sql_file" || true)"
          if [ "$snapshot_insert_count" -le 0 ]; then
            echo "Option D1 import SQL contains no snapshot rows; refusing to update D1 metadata." >&2
            exit 1
          fi
          npx --yes wrangler@latest d1 execute "$OPTION_CONTRACT_D1_DATABASE_NAME" --remote --file "$sql_file"

      - name: Validate option D1 snapshot date
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPTION_CONTRACT_D1_DATABASE_NAME: ${{ vars.OPTION_CONTRACT_D1_DATABASE_NAME }}
        run: |
          set -euo pipefail
          npx --yes wrangler@latest d1 execute "$OPTION_CONTRACT_D1_DATABASE_NAME" --remote --json --command "
          SELECT
            (SELECT value FROM metadata WHERE key = 'as_of_date') AS option_snapshot_date,
            (SELECT value FROM metadata WHERE key = 'underlying_reference_date') AS underlying_reference_date,
            MAX(snapshot_date) AS latest_snapshot_date,
            MAX(asof) AS latest_asof,
            SUM(CASE WHEN snapshot_date = (SELECT value FROM metadata WHERE key = 'as_of_date') THEN 1 ELSE 0 END) AS snapshot_rows
          FROM option_contract_liquidity_snapshots
          " > /tmp/option-d1-snapshot-validation.json
          python - <<'PY'
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo
          row = json.load(open('/tmp/option-d1-snapshot-validation.json', encoding='utf-8'))[0]['results'][0]
          option_snapshot_date = str(row.get('option_snapshot_date') or '')[:10]
          latest_snapshot_date = str(row.get('latest_snapshot_date') or '')[:10]
          latest_asof = str(row.get('latest_asof') or '')
          latest_asof_market_date = ''
          if latest_asof:
              latest_asof_market_date = datetime.fromisoformat(latest_asof.replace('Z', '+00:00')).astimezone(ZoneInfo('America/New_York')).date().isoformat()
          snapshot_rows = int(row.get('snapshot_rows') or 0)
          if not option_snapshot_date:
              raise SystemExit(f"missing option D1 metadata as_of_date: {row}")
          if latest_snapshot_date != option_snapshot_date:
              raise SystemExit(f"latest snapshot mismatch: {row}")
          if latest_asof_market_date and latest_asof_market_date != option_snapshot_date:
              raise SystemExit(f"option chain asof date does not match snapshot_date: {row}")
          if snapshot_rows <= 0:
              raise SystemExit(f"latest option snapshot has no rows: {row}")
          print(row)
          PY

      - name: Recalculate option volume and PCR aggregates from D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPTION_CONTRACT_D1_DATABASE_NAME: ${{ inputs.option_contract_d1_database_name || vars.OPTION_CONTRACT_D1_DATABASE_NAME }}
        run: |
          set -euo pipefail
          aggregate_json="/tmp/option-put-liquidity-aggregate.json"
          aggregate_parts_dir="/tmp/option-d1-aggregate-parts"
          rm -rf "$aggregate_parts_dir"
          mkdir -p "$aggregate_parts_dir"
          python - <<'PY' > /tmp/option-symbol-chunks.txt
          import json
          from pathlib import Path
          root = Path('frontend/public/static-data')
          pool_path = root / 'markets/us/options/option-chain-tracking-pool.json'
          symbols = []
          if pool_path.exists():
              payload = json.loads(pool_path.read_text(encoding='utf-8'))
              symbols = [str(symbol).upper().strip() for symbol in payload.get('active_symbols') or []]
          symbols = sorted({symbol.replace("'", "''") for symbol in symbols if symbol})
          if not symbols:
              raise SystemExit('No option-chain tracking symbols found for D1 aggregate repair')
          chunk_size = 35
          for index in range(0, len(symbols), chunk_size):
              chunk = symbols[index:index + chunk_size]
              print(','.join(f"'{symbol}'" for symbol in chunk))
          PY
          chunk_count="$(wc -l < /tmp/option-symbol-chunks.txt | tr -d ' ')"
          echo "Querying option D1 PCR aggregate in ${chunk_count} symbol chunks"
          chunk_index=0
          while IFS= read -r symbol_filter; do
            chunk_index=$((chunk_index + 1))
            echo "Querying D1 aggregate chunk ${chunk_index}/${chunk_count}"
            npx --yes wrangler@latest d1 execute "$OPTION_CONTRACT_D1_DATABASE_NAME" --remote --json --command "
          WITH recent_dates AS (
            SELECT DISTINCT snapshot_date
            FROM option_contract_liquidity_snapshots
            ORDER BY snapshot_date DESC
            LIMIT 30
          ),
          bucketed AS (
            SELECT
              snapshot_date,
              underlying_symbol,
              option_type,
              volume,
              open_interest,
              asof,
              CASE
                WHEN dte_at_snapshot BETWEEN 0 AND 30 THEN 'dte0_30'
                WHEN dte_at_snapshot BETWEEN 31 AND 60 THEN 'dte31_60'
                WHEN dte_at_snapshot BETWEEN 61 AND 90 THEN 'dte61_90'
                ELSE NULL
              END AS bucket
            FROM option_contract_liquidity_snapshots
            WHERE dte_at_snapshot BETWEEN 0 AND 90
              AND snapshot_date IN (SELECT snapshot_date FROM recent_dates)
              AND underlying_symbol IN (${symbol_filter})
          ),
          scoped AS (
            SELECT * FROM bucketed WHERE bucket IS NOT NULL
            UNION ALL
            SELECT
              snapshot_date,
              underlying_symbol,
              option_type,
              volume,
              open_interest,
              asof,
              'dte0_90_total' AS bucket
            FROM bucketed
            WHERE bucket IN ('dte0_30', 'dte31_60', 'dte61_90')
          )
          SELECT
            snapshot_date AS date,
            underlying_symbol AS symbol,
            bucket,
            SUM(CASE WHEN option_type = 'PUT' THEN volume ELSE 0 END) AS put_volume,
            SUM(CASE WHEN option_type = 'CALL' THEN volume ELSE 0 END) AS call_volume,
            SUM(CASE WHEN option_type = 'PUT' THEN open_interest ELSE 0 END) AS put_oi,
            SUM(CASE WHEN option_type = 'CALL' THEN open_interest ELSE 0 END) AS call_oi,
            CASE
              WHEN SUM(CASE WHEN option_type = 'CALL' THEN volume ELSE 0 END) > 0
              THEN 1.0 * SUM(CASE WHEN option_type = 'PUT' THEN volume ELSE 0 END)
                   / SUM(CASE WHEN option_type = 'CALL' THEN volume ELSE 0 END)
              ELSE NULL
            END AS pcr,
            CASE
              WHEN SUM(CASE WHEN option_type = 'CALL' THEN volume ELSE 0 END) > 0
              THEN 1.0 * SUM(CASE WHEN option_type = 'PUT' THEN volume ELSE 0 END)
                   / SUM(CASE WHEN option_type = 'CALL' THEN volume ELSE 0 END)
              ELSE NULL
            END AS pcr_volume,
            CASE
              WHEN SUM(CASE WHEN option_type = 'CALL' THEN open_interest ELSE 0 END) > 0
              THEN 1.0 * SUM(CASE WHEN option_type = 'PUT' THEN open_interest ELSE 0 END)
                   / SUM(CASE WHEN option_type = 'CALL' THEN open_interest ELSE 0 END)
              ELSE NULL
            END AS pcr_oi,
            SUM(CASE WHEN option_type = 'PUT' THEN 1 ELSE 0 END) AS put_contract_count,
            SUM(CASE WHEN option_type = 'CALL' THEN 1 ELSE 0 END) AS call_contract_count,
            COUNT(*) AS contract_count,
            MAX(asof) AS asof
          FROM scoped
          GROUP BY snapshot_date, underlying_symbol, bucket
          ORDER BY snapshot_date, underlying_symbol, bucket
          " > "$aggregate_parts_dir/chunk-${chunk_index}.json"
          done < /tmp/option-symbol-chunks.txt
          AGGREGATE_JSON="$aggregate_json" AGGREGATE_PARTS_DIR="$aggregate_parts_dir" python - <<'PY'
          import glob
          import json
          import os
          parts = []
          for path in sorted(glob.glob(os.path.join(os.environ['AGGREGATE_PARTS_DIR'], 'chunk-*.json'))):
              with open(path, encoding='utf-8') as handle:
                  payload = json.load(handle)
              if isinstance(payload, list):
                  parts.extend(payload)
              else:
                  parts.append(payload)
          with open(os.environ['AGGREGATE_JSON'], 'w', encoding='utf-8') as handle:
              json.dump(parts, handle)
          print({'chunks': len(parts), 'aggregate_json': os.environ['AGGREGATE_JSON']})
          PY
          PYTHONPATH=backend python -m app.scripts.patch_option_liquidity_from_d1 \
            --static-data-dir frontend/public/static-data \
            --d1-aggregate-json "$aggregate_json" \
            --history-window-days 30

      - name: Validate static data contract
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('frontend/public/static-data')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          assert manifest['schema_version'] == 'static-site-v2'
          assert manifest['default_market'] == 'US'
          scan_path = root / manifest['markets']['US']['pages']['scan']['path']
          scan = json.loads(scan_path.read_text(encoding='utf-8'))
          assert scan['schema_version'] == 'static-scan-v1'
          assert manifest.get('git_push_hash'), 'root static manifest missing git_push_hash'
          assert scan.get('git_push_hash'), 'scan manifest missing git_push_hash'
          assert scan['rows_total'] >= 3000
          assert scan['initial_rows']
          required = {'symbol', 'company_name', 'market', 'composite_score', 'volume', 'market_cap', 'gics_sector'}
          missing = required - set(scan['initial_rows'][0])
          if missing:
              raise SystemExit(f'missing required scan row fields: {sorted(missing)}')
          priced = price_sparklines = rs_sparklines = 0
          for chunk in scan['chunks']:
              path = root / chunk['path']
              if not path.exists():
                  raise SystemExit(f'missing scan chunk: {path}')
              payload = json.loads(path.read_text(encoding='utf-8'))
              rows = payload.get('rows', [])
              priced += sum(1 for row in rows if row.get('current_price') is not None)
              price_sparklines += sum(1 for row in rows if row.get('price_sparkline_data'))
              rs_sparklines += sum(1 for row in rows if row.get('rs_sparkline_data'))
          price_coverage = priced / scan['rows_total'] if scan['rows_total'] else 0
          price_sparkline_coverage = price_sparklines / scan['rows_total'] if scan['rows_total'] else 0
          rs_sparkline_coverage = rs_sparklines / scan['rows_total'] if scan['rows_total'] else 0
          if price_coverage < 0.80:
              raise SystemExit(f'static scan price coverage too low: {price_coverage:.2%}')
          if price_sparkline_coverage < 0.80:
              raise SystemExit(f'static scan price sparkline coverage too low: {price_sparkline_coverage:.2%}')
          if rs_sparkline_coverage < 0.80:
              raise SystemExit(f'static scan RS sparkline coverage too low: {rs_sparkline_coverage:.2%}')
          print({
              'rows_total': scan['rows_total'],
              'chunks': len(scan['chunks']),
              'price_coverage': round(price_coverage, 6),
              'price_sparkline_coverage': round(price_sparkline_coverage, 6),
              'rs_sparkline_coverage': round(rs_sparkline_coverage, 6),
          })
          PY

      - name: Upload D1-patched static data artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-data-patched-us
          path: frontend/public/static-data
          if-no-files-found: error
          retention-days: 2
          overwrite: true

  deploy-pages:
    needs: import-option-d1
    runs-on: ubuntu-latest
    env:
      STATIC_DATA_DIR: frontend/public/static-data

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Download D1-patched static data artifact
        uses: actions/download-artifact@v4
        with:
          name: static-data-patched-us
          path: frontend/public/static-data

      - name: Build static frontend
        env:
          VITE_STATIC_SITE: "true"
          VITE_BASE_PATH: /
          VITE_STATIC_DATA_BASE_URL: /static-data
          VITE_GIT_PUSH_HASH: ${{ github.sha }}
        run: cd frontend && npm run build

      - name: Validate Cloudflare static deployment configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          STATIC_DATA_BASE_URL: ${{ vars.STATIC_DATA_BASE_URL }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          missing=0
          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            R2_ACCESS_KEY_ID \
            R2_SECRET_ACCESS_KEY \
            R2_BUCKET \
            STATIC_DATA_BASE_URL \
            CLOUDFLARE_PAGES_PROJECT; do
            if [ -z "${!name}" ]; then
              echo "Missing required Cloudflare static deployment setting: ${name}" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Upload static data to Cloudflare R2
        env:
          R2_BUCKET: ${{ vars.R2_BUCKET }}
        run: |
          rclone sync frontend/public/static-data/ "r2:${R2_BUCKET}/static-data" \
            --s3-no-check-bucket \
            --checksum \
            --delete-during \
            --transfers 8 \
            --checkers 16

      - name: Verify Pages bundle excludes static-data
        run: |
          rm -rf frontend/dist/static-data
          test ! -e frontend/dist/static-data

      - name: Deploy frontend to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          cd frontend
          npx --yes wrangler@latest pages deploy dist \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch main \
            --commit-hash "${GITHUB_SHA}"
