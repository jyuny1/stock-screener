name: Optionable Symbols

on:
  # Scheduled through Static Pipeline Full so optionable-symbols, foundation,
  # prices, metrics, groups, and static-site publish use one ordered cadence.
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if this ISO week would normally be skipped."
        required: false
        type: boolean
        default: true
      dry_run:
        description: "Skip Schwab /chains and publish filtered NasdaqTrader candidates."
        required: false
        type: boolean
        default: false
      max_symbols:
        description: "Optional cap for smoke testing. Blank scans all filtered symbols."
        required: false
        type: string
        default: ''
      retry_errors_from_latest:
        description: "Seed checkpoint from latest artifact and retry only prior http_/error failures."
        required: false
        type: boolean
        default: false
      max_retry_rounds:
        description: "Additional in-run retry rounds for remaining http_/error failures."
        required: false
        type: string
        default: '3'

concurrency:
  group: schwab-token-refresh
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  publish:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Decide whether to run
        id: cadence
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          et_dow="$(TZ=America/New_York date +%u)"
          et_hour="$(TZ=America/New_York date +%H)"
          et_week="$(TZ=America/New_York date +%V)"
          taiwan_now="$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S %Z')"
          eastern_now="$(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Taiwan now: ${taiwan_now}"
          echo "Eastern now: ${eastern_now}"
          if [ "$et_dow" = "7" ] && [ "$et_hour" = "20" ] && [ $((10#$et_week % 2)) -eq 0 ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping; target is every other Sunday 20:00 America/New_York."
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: ${{ steps.cadence.outputs.run_scan == 'true' }}

      - uses: actions/setup-python@v6
        if: ${{ steps.cadence.outputs.run_scan == 'true' }}
        with:
          python-version: "3.11"
          cache: pip

      - name: Install optionable-symbols dependencies
        if: ${{ steps.cadence.outputs.run_scan == 'true' }}
        run: pip install requests

      - name: Validate Schwab secrets
        if: ${{ steps.cadence.outputs.run_scan == 'true' && github.event.inputs.dry_run != 'true' }}
        env:
          SCHWAB_CLIENT_ID: ${{ secrets.SCHWAB_CLIENT_ID }}
          SCHWAB_CLIENT_SECRET: ${{ secrets.SCHWAB_CLIENT_SECRET }}
          SCHWAB_REFRESH_TOKEN: ${{ secrets.SCHWAB_REFRESH_TOKEN }}
          SCHWAB_SECRET_WRITE_TOKEN: ${{ secrets.SCHWAB_SECRET_WRITE_TOKEN }}
        run: |
          missing=0
          for name in SCHWAB_CLIENT_ID SCHWAB_CLIENT_SECRET SCHWAB_REFRESH_TOKEN SCHWAB_SECRET_WRITE_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required Actions secret: ${name}" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Configure Schwab OAuth secrets before running a real optionable scan." >&2
            exit 1
          fi

      - name: Ensure optionable release exists
        if: ${{ steps.cadence.outputs.run_scan == 'true' && github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.SCHWAB_SECRET_WRITE_TOKEN }}
        run: |
          gh release view optionable-symbols \
            --repo "${{ github.repository }}" >/dev/null 2>&1 || \
          gh release create optionable-symbols \
            --repo "${{ github.repository }}" \
            --title "US Optionable Symbols" \
            --notes "Automated US optionable universe symbols for static deployments."

      - name: Refresh Schwab token and persist rotation
        if: ${{ steps.cadence.outputs.run_scan == 'true' && github.event.inputs.dry_run != 'true' }}
        env:
          SCHWAB_CLIENT_ID: ${{ secrets.SCHWAB_CLIENT_ID }}
          SCHWAB_CLIENT_SECRET: ${{ secrets.SCHWAB_CLIENT_SECRET }}
          SCHWAB_REFRESH_TOKEN: ${{ secrets.SCHWAB_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.SCHWAB_SECRET_WRITE_TOKEN }}
        run: |
          cd backend
          python - <<'PY'
          from pathlib import Path
          from app.services.schwab_token_service import SchwabTokenService

          pair = SchwabTokenService.from_env().refresh_from_env()
          Path('/tmp/schwab-access-token.txt').write_text(pair.access_token, encoding='utf-8')
          Path('/tmp/schwab-new-refresh-token.txt').write_text(pair.new_refresh_token, encoding='utf-8')
          PY
          echo "::add-mask::$(cat /tmp/schwab-access-token.txt)"
          echo "::add-mask::$(cat /tmp/schwab-new-refresh-token.txt)"
          echo "SCHWAB_ACCESS_TOKEN=$(cat /tmp/schwab-access-token.txt)" >> "$GITHUB_ENV"
          echo "SCHWAB_REFRESH_TOKEN=$(cat /tmp/schwab-new-refresh-token.txt)" >> "$GITHUB_ENV"
          cat /tmp/schwab-new-refresh-token.txt | gh secret set SCHWAB_REFRESH_TOKEN \
            --repo "${{ github.repository }}" \
            --app actions

      - name: Seed checkpoint from latest artifact
        if: ${{ steps.cadence.outputs.run_scan == 'true' && github.event.inputs.retry_errors_from_latest == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.SCHWAB_SECRET_WRITE_TOKEN }}
        run: |
          mkdir -p /tmp/optionable-symbols
          gh release download optionable-symbols \
            --repo "${{ github.repository }}" \
            --pattern "optionable-symbols-latest-us.json" \
            --dir /tmp/optionable-symbols \
            --clobber
          cp /tmp/optionable-symbols/optionable-symbols-latest-us.json /tmp/optionable-symbols/checkpoint.json

      - name: Build optionable symbols artifact
        if: ${{ steps.cadence.outputs.run_scan == 'true' }}
        env:
          SCHWAB_CLIENT_ID: ${{ secrets.SCHWAB_CLIENT_ID }}
          SCHWAB_CLIENT_SECRET: ${{ secrets.SCHWAB_CLIENT_SECRET }}
          SCHWAB_NEW_REFRESH_TOKEN_FILE: /tmp/schwab-new-refresh-token.txt
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_MAX_SYMBOLS: ${{ github.event.inputs.max_symbols }}
          INPUT_MAX_RETRY_ROUNDS: ${{ github.event.inputs.max_retry_rounds || '3' }}
        run: |
          cd backend
          args=(--output-dir /tmp/optionable-symbols --checkpoint /tmp/optionable-symbols/checkpoint.json)
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ -n "$INPUT_MAX_SYMBOLS" ]; then
            args+=(--max-symbols "$INPUT_MAX_SYMBOLS")
          fi
          args+=(--max-retry-rounds "${INPUT_MAX_RETRY_ROUNDS:-3}")
          python -m app.scripts.build_optionable_symbols "${args[@]}"

      - name: Persist final Schwab refresh token
        if: ${{ always() && steps.cadence.outputs.run_scan == 'true' && github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.SCHWAB_SECRET_WRITE_TOKEN }}
        run: |
          if [ ! -s /tmp/schwab-new-refresh-token.txt ]; then
            echo "Schwab refresh token file is missing; refusing to continue." >&2
            exit 1
          fi
          cat /tmp/schwab-new-refresh-token.txt | gh secret set SCHWAB_REFRESH_TOKEN \
            --repo "${{ github.repository }}" \
            --app actions

      - name: Upload failed optionable diagnostics
        if: ${{ failure() && steps.cadence.outputs.run_scan == 'true' }}
        uses: actions/upload-artifact@v5
        with:
          name: optionable-symbols-diagnostics
          path: |
            /tmp/optionable-symbols/*.json
            /tmp/optionable-symbols/*.jsonl
          if-no-files-found: ignore

      - name: Upload optionable assets
        if: ${{ steps.cadence.outputs.run_scan == 'true' && github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.SCHWAB_SECRET_WRITE_TOKEN }}
        run: |
          gh release upload optionable-symbols \
            /tmp/optionable-symbols/optionable-symbols-latest-us.json \
            --repo "${{ github.repository }}" \
            --clobber
          dated="$(find /tmp/optionable-symbols -maxdepth 1 -name 'optionable-symbols-us-*.json' | head -n 1)"
          if [ -n "$dated" ]; then
            gh release upload optionable-symbols "$dated" \
              --repo "${{ github.repository }}" \
              --clobber
          fi
