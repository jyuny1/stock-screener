name: SOXL Price D1 Import

on:
  workflow_dispatch:
    inputs:
      d1_database_name:
        description: "Optional SOXL price D1 database name override. Defaults to SOXL_PRICE_D1_DATABASE_NAME or stock-screener-soxl-price."
        required: false
        type: string
        default: ""
      intraday_period_days:
        description: "Schwab 1-minute period days. Valid values: 1, 2, 3, 4, 5, 10."
        required: false
        type: choice
        default: "10"
        options: ["1", "2", "3", "4", "5", "10"]
      daily_period_years:
        description: "Schwab daily history years."
        required: false
        type: choice
        default: "5"
        options: ["1", "2", "3", "5", "10", "15", "20"]
      intraday_retention_days:
        description: "D1 retention days for 1-minute candles."
        required: false
        type: string
        default: "180"
  schedule:
    # Weekdays after the regular US session. This job is independent from static-site.
    - cron: "0 23 * * 1-5"

concurrency:
  # Schwab refresh tokens are single-use; share the lock with other Schwab workflows.
  group: schwab-token-refresh
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  import-soxl-price-d1:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    env:
      SOXL_D1_DATABASE_NAME: ${{ inputs.d1_database_name || vars.SOXL_PRICE_D1_DATABASE_NAME || 'stock-screener-soxl-price' }}
      INTRADAY_PERIOD_DAYS: ${{ inputs.intraday_period_days || '10' }}
      DAILY_PERIOD_YEARS: ${{ inputs.daily_period_years || '5' }}
      INTRADAY_RETENTION_DAYS: ${{ inputs.intraday_retention_days || '180' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python support calculation dependencies
        run: python -m pip install --disable-pip-version-check "numpy==1.26.3" "pandas==2.2.0"

      - name: Validate workflow settings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SCHWAB_CLIENT_ID: ${{ secrets.SCHWAB_CLIENT_ID }}
          SCHWAB_CLIENT_SECRET: ${{ secrets.SCHWAB_CLIENT_SECRET }}
          SCHWAB_REFRESH_TOKEN: ${{ secrets.SCHWAB_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.SCHWAB_SECRET_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            SCHWAB_CLIENT_ID \
            SCHWAB_CLIENT_SECRET \
            SCHWAB_REFRESH_TOKEN \
            GH_TOKEN \
            SOXL_D1_DATABASE_NAME; do
            if [ -z "${!name}" ]; then
              echo "Missing required SOXL D1 workflow setting: ${name}" >&2
              missing=1
            fi
          done
          case "$INTRADAY_RETENTION_DAYS" in
            ''|*[!0-9]*) echo "intraday_retention_days must be numeric" >&2; missing=1 ;;
          esac
          echo "SOXL D1 target: ${SOXL_D1_DATABASE_NAME}"
          exit "$missing"

      - name: Ensure SOXL D1 database exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx --yes wrangler@latest d1 list --json > /tmp/d1-list.json
          if python - <<'PY'
          import json, os
          name = os.environ['SOXL_D1_DATABASE_NAME']
          rows = json.load(open('/tmp/d1-list.json', encoding='utf-8'))
          raise SystemExit(0 if any(row.get('name') == name for row in rows) else 1)
          PY
          then
            echo "D1 database already exists: ${SOXL_D1_DATABASE_NAME}"
          else
            echo "Creating D1 database: ${SOXL_D1_DATABASE_NAME}"
            npx --yes wrangler@latest d1 create "$SOXL_D1_DATABASE_NAME" --location apac
          fi

      - name: Refresh Schwab token and persist rotation
        env:
          SCHWAB_CLIENT_ID: ${{ secrets.SCHWAB_CLIENT_ID }}
          SCHWAB_CLIENT_SECRET: ${{ secrets.SCHWAB_CLIENT_SECRET }}
          SCHWAB_REFRESH_TOKEN: ${{ secrets.SCHWAB_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.SCHWAB_SECRET_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          cd backend
          python -m app.scripts.refresh_schwab_oauth_token \
            --access-token-file /tmp/schwab-access-token.txt \
            --refresh-token-file /tmp/schwab-new-refresh-token.txt
          echo "::add-mask::$(cat /tmp/schwab-access-token.txt)"
          echo "::add-mask::$(cat /tmp/schwab-new-refresh-token.txt)"
          echo "SCHWAB_ACCESS_TOKEN=$(cat /tmp/schwab-access-token.txt)" >> "$GITHUB_ENV"
          echo "SCHWAB_REFRESH_TOKEN=$(cat /tmp/schwab-new-refresh-token.txt)" >> "$GITHUB_ENV"
          cat /tmp/schwab-new-refresh-token.txt | gh secret set SCHWAB_REFRESH_TOKEN \
            --repo "${{ github.repository }}" \
            --app actions

      - name: Build SOXL price D1 import SQL
        run: |
          set -euo pipefail
          cd backend
          python -m app.scripts.build_soxl_price_d1_import \
            --symbol SOXL \
            --intraday-period-days "$INTRADAY_PERIOD_DAYS" \
            --daily-period-years "$DAILY_PERIOD_YEARS" \
            --retention-days "$INTRADAY_RETENTION_DAYS" \
            --output /tmp/soxl-price-d1.sql
          test -s /tmp/soxl-price-d1.sql

      - name: Import SOXL price data into D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx --yes wrangler@latest d1 execute "$SOXL_D1_DATABASE_NAME" --remote --file /tmp/soxl-price-d1.sql

      - name: Validate SOXL D1 import
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx --yes wrangler@latest d1 execute "$SOXL_D1_DATABASE_NAME" --remote --json --command \
            "SELECT 'daily' AS table_name, COUNT(*) AS rows_total, MAX(trading_date) AS latest_date FROM soxl_daily_candles UNION ALL SELECT 'intraday' AS table_name, COUNT(*) AS rows_total, MAX(trading_date) AS latest_date FROM soxl_intraday_candles UNION ALL SELECT 'support' AS table_name, COUNT(*) AS rows_total, MAX(as_of) AS latest_date FROM soxl_support_snapshots" \
            > /tmp/soxl-d1-counts.json
          cat /tmp/soxl-d1-counts.json
          python - <<'PY'
          import json
          payload = json.load(open('/tmp/soxl-d1-counts.json', encoding='utf-8'))
          rows = payload[0].get('results', []) if payload else []
          counts = {row['table_name']: int(row['rows_total'] or 0) for row in rows}
          if counts.get('daily', 0) <= 0 or counts.get('intraday', 0) <= 0 or counts.get('support', 0) <= 0:
              raise SystemExit(f'SOXL D1 import validation failed: {rows}')
          print({'validated_counts': counts})
          PY
          npx --yes wrangler@latest d1 execute "$SOXL_D1_DATABASE_NAME" --remote --json --command \
            "SELECT s.as_of, s.spot, m.value AS latest_intraday_date, s.daily_support_json, s.intraday_support_json, s.merged_support_json, s.sell_put_buckets_json, length(s.daily_support_json) AS daily_len, length(s.intraday_support_json) AS intraday_len, length(s.merged_support_json) AS merged_len, length(s.sell_put_buckets_json) AS buckets_len FROM soxl_support_snapshots s LEFT JOIN soxl_price_metadata m ON m.key = 'latest_intraday_date' ORDER BY s.as_of DESC LIMIT 1" \
            > /tmp/soxl-d1-support-validation.json
          python - <<'PY'
          import json
          payload = json.load(open('/tmp/soxl-d1-support-validation.json', encoding='utf-8'))
          rows = payload[0].get('results', []) if payload else []
          if not rows:
              raise SystemExit('SOXL D1 support snapshot validation failed: no latest support row')
          row = rows[0]
          if row.get('latest_intraday_date') and row.get('as_of') != row.get('latest_intraday_date'):
              raise SystemExit(f"SOXL support as_of mismatch: {row}")
          max_json_bytes = 512 * 1024
          for name in ('daily', 'intraday', 'merged', 'buckets'):
              size = int(row.get(f'{name}_len') or 0)
              if size <= 2 or size > max_json_bytes:
                  raise SystemExit(f'SOXL {name} support JSON size invalid: {size}')
          daily = json.loads(row['daily_support_json'])
          intraday = json.loads(row['intraday_support_json'])
          merged = json.loads(row['merged_support_json'])
          buckets = json.loads(row['sell_put_buckets_json'])
          if not daily.get('status') or not intraday.get('status') or not merged.get('status'):
              raise SystemExit('SOXL support JSON missing status fields')
          if not isinstance(buckets.get('sellPutSupportBuckets'), list) or not buckets['sellPutSupportBuckets']:
              raise SystemExit('SOXL sell-put support buckets are empty')
          print({
              'validated_support_snapshot': {
                  'as_of': row.get('as_of'),
                  'spot': row.get('spot'),
                  'json_lengths': {name: row.get(f'{name}_len') for name in ('daily', 'intraday', 'merged', 'buckets')},
                  'bucket_count': len(buckets['sellPutSupportBuckets']),
              }
          })
          PY

      - name: Export SOXL D1 daily candles artifact
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx --yes wrangler@latest d1 execute "$SOXL_D1_DATABASE_NAME" --remote --json --command \
            "SELECT trading_date AS date, open, high, low, close, volume FROM soxl_daily_candles ORDER BY trading_date" \
            > /tmp/soxl-daily-candles.json
          npx --yes wrangler@latest d1 execute "$SOXL_D1_DATABASE_NAME" --remote --json --command \
            "SELECT trading_date AS date, datetime_et, open, high, low, close, volume FROM soxl_intraday_candles ORDER BY ts" \
            > /tmp/soxl-intraday-candles.json
          npx --yes wrangler@latest d1 execute "$SOXL_D1_DATABASE_NAME" --remote --json --command \
            "SELECT symbol, as_of, spot, sell_put_buckets_json, created_at FROM soxl_support_snapshots ORDER BY as_of DESC LIMIT 5" \
            > /tmp/soxl-support-snapshots.json
          test -s /tmp/soxl-daily-candles.json
          test -s /tmp/soxl-intraday-candles.json
          test -s /tmp/soxl-support-snapshots.json

      - name: Upload SOXL D1 daily candles artifact
        uses: actions/upload-artifact@v4
        with:
          name: soxl-d1-daily-candles
          path: |
            /tmp/soxl-daily-candles.json
            /tmp/soxl-intraday-candles.json
            /tmp/soxl-support-snapshots.json
          if-no-files-found: error
          retention-days: 2
