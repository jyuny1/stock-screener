name: ETF Profile Data

on:
  workflow_dispatch:

concurrency:
  group: etf-profile-us
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-us:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install profile dependencies
        run: python -m pip install --upgrade yfinance curl_cffi

      - name: Ensure ETF profile release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view etf-profile-data --repo "${{ github.repository }}" >/dev/null 2>&1 || \
          gh release create etf-profile-data --repo "${{ github.repository }}" --title "ETF Profile Data" --notes "Artifact-native US ETF profile/AUM data."

      - name: Download foundation and prior profile
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/foundation-update /tmp/etf-profile-prior
          gh release download foundation-update-data --repo "${{ github.repository }}" --pattern foundation-update-latest-us.json --dir /tmp/foundation-update --clobber
          foundation_bundle="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('/tmp/foundation-update/foundation-update-latest-us.json').read_text())['bundle_asset_name'])
          PY
          )"
          echo "FOUNDATION_UPDATE_BUNDLE=/tmp/foundation-update/${foundation_bundle}" >> "$GITHUB_ENV"
          gh release download foundation-update-data --repo "${{ github.repository }}" --pattern "${foundation_bundle}" --dir /tmp/foundation-update --clobber

          if gh release download etf-profile-data --repo "${{ github.repository }}" --pattern etf-profile-latest-us.json --dir /tmp/etf-profile-prior --clobber; then
            prior_bundle="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('/tmp/etf-profile-prior/etf-profile-latest-us.json').read_text())['bundle_asset_name'])
          PY
          )"
            gh release download etf-profile-data --repo "${{ github.repository }}" --pattern "${prior_bundle}" --dir /tmp/etf-profile-prior --clobber
            echo "PRIOR_PROFILE=/tmp/etf-profile-prior/${prior_bundle}" >> "$GITHUB_ENV"
          fi

      - name: Build ETF profile artifact
        run: |
          set -euo pipefail
          args=(--mode etf-profile --foundation-update "$FOUNDATION_UPDATE_BUNDLE" --output-dir /tmp/etf-profile)
          if [ -n "${PRIOR_PROFILE:-}" ]; then args+=(--prior-profile "$PRIOR_PROFILE"); fi
          cd backend
          python -m app.scripts.build_profile_artifact "${args[@]}"

      - name: Validate ETF profile outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('/tmp/etf-profile/etf-profile-latest-us.json').read_text())
          if manifest.get('market') != 'US':
              raise SystemExit('ETF profile market must be US')
          if int(manifest.get('symbol_count') or 0) < 1000:
              raise SystemExit(f"ETF profile symbol count too low: {manifest.get('symbol_count')}")
          print(manifest)
          PY

      - name: Upload ETF profile assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bundle="$(find /tmp/etf-profile -maxdepth 1 -name 'etf-profile-us-*.json.gz' | head -n 1)"
          gh release upload etf-profile-data "$bundle" --repo "${{ github.repository }}" --clobber
          gh release upload etf-profile-data /tmp/etf-profile/etf-profile-latest-us.json --repo "${{ github.repository }}" --clobber
