name: Option Screener API

on:
  workflow_dispatch:

concurrency:
  group: option-screener-api
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-deploy:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/option-screener-api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OPTION_SCREENER_API_TOKEN: ${{ secrets.OPTION_SCREENER_API_TOKEN }}
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      OPTION_CONTRACT_D1_DATABASE_NAME: ${{ vars.OPTION_CONTRACT_D1_DATABASE_NAME }}
      OPTION_CONTRACT_D1_DATABASE_ID: ${{ vars.OPTION_CONTRACT_D1_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/option-screener-api/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate deployment settings
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID R2_BUCKET OPTION_SCREENER_API_TOKEN OPTION_CONTRACT_D1_DATABASE_NAME OPTION_CONTRACT_D1_DATABASE_ID; do
            if [ -z "${!name}" ]; then
              echo "Missing required deployment setting: ${name}" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Resolve D1 database id
        run: |
          set -euo pipefail
          resolved_id="$({ npx wrangler d1 list --json || echo '[]'; } | python3 -c 'import json,sys,os; rows=json.load(sys.stdin); name=os.environ["OPTION_CONTRACT_D1_DATABASE_NAME"]; matches=[r for r in rows if r.get("name")==name]; print((matches[0].get("uuid") or matches[0].get("id")) if matches else os.environ["OPTION_CONTRACT_D1_DATABASE_ID"])')"
          if [ -z "$resolved_id" ]; then
            echo "Unable to resolve D1 database id" >&2
            exit 1
          fi
          echo "OPTION_CONTRACT_D1_DATABASE_ID=${resolved_id}" >> "$GITHUB_ENV"
          echo "Resolved D1 database '${OPTION_CONTRACT_D1_DATABASE_NAME}' for Worker binding"

      - name: Configure Cloudflare bindings
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          path = Path('wrangler.jsonc')
          raw = path.read_text(encoding='utf-8')
          raw = raw.replace('replace-with-r2-bucket', os.environ['R2_BUCKET'])
          raw = raw.replace('replace-with-d1-database', os.environ['OPTION_CONTRACT_D1_DATABASE_NAME'])
          raw = raw.replace('replace-with-d1-database-id', os.environ['OPTION_CONTRACT_D1_DATABASE_ID'])
          raw = raw.replace(
              '  "name": "stock-option-screener-api",',
              '  "name": "stock-option-screener-api",\n  "account_id": "' + os.environ['CLOUDFLARE_ACCOUNT_ID'] + '",',
          )
          path.write_text(raw, encoding='utf-8')
          PY

      - name: Deploy Worker
        run: npx wrangler deploy

      - name: Configure agent bearer token secret
        run: printf '%s' "$OPTION_SCREENER_API_TOKEN" | npx wrangler secret put OPTION_SCREENER_API_TOKEN

      - name: Smoke test deployed D1 options API
        run: |
          set -euo pipefail
          base_url="https://ss.ljy.app/api/v1"
          for path in options/manifest 'options/contracts?limit=1' 'options/summary?limit=1'; do
            echo "Testing /api/v1/${path}"
            curl -fsS "${base_url}/${path}" \
              -H "Authorization: Bearer ${OPTION_SCREENER_API_TOKEN}" \
              -o /tmp/option-api-response.json
            python3 - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/option-api-response.json').read_text())
          assert payload.get('schema_version') == 'option-screener-api-v1', payload
          assert 'error' not in payload, payload
          print(json.dumps({
              'meta': payload.get('meta', {}),
              'returned': payload.get('data', {}).get('pagination', {}).get('returned'),
              'latest_snapshot_date': payload.get('data', {}).get('latest_snapshot_date'),
          }, ensure_ascii=False))
          PY
          done
