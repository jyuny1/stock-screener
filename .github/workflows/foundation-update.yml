name: Foundation Update

on:
  workflow_dispatch:

concurrency:
  group: foundation-update-us
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-us:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install artifact-native foundation dependencies
        run: pip install yfinance curl_cffi

      - name: Ensure foundation update release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view foundation-update-data \
            --repo "${{ github.repository }}" >/dev/null 2>&1 || \
          gh release create foundation-update-data \
            --repo "${{ github.repository }}" \
            --title "Foundation Update" \
            --notes "Artifact-native US foundation data for static-site builds."

      - name: Download US optionable symbols
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/optionable-symbols
          gh release download optionable-symbols \
            --repo "${{ github.repository }}" \
            --pattern optionable-symbols-latest-us.json \
            --dir /tmp/optionable-symbols \
            --clobber
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('/tmp/optionable-symbols/optionable-symbols-latest-us.json').read_text(encoding='utf-8'))
          if manifest.get('market') != 'US':
              raise SystemExit(f"optionable market must be US, got {manifest.get('market')!r}")
          if len(manifest.get('symbols') or []) < 3000:
              raise SystemExit(f"optionable symbol count too low: {len(manifest.get('symbols') or [])}")
          print({'optionable_symbols': len(manifest.get('symbols') or []), 'as_of': manifest.get('as_of')})
          PY
          echo "OPTIONABLE_SYMBOLS=/tmp/optionable-symbols/optionable-symbols-latest-us.json" >> "$GITHUB_ENV"

      - name: Download prior foundation artifact if available
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/prior-foundation
          PRIOR_RELEASE="foundation-update-data"
          PRIOR_MANIFEST="foundation-update-latest-us.json"
          if ! gh release download "$PRIOR_RELEASE" \
            --repo "${{ github.repository }}" \
            --pattern "$PRIOR_MANIFEST" \
            --dir /tmp/prior-foundation \
            --clobber; then
            echo "No prior foundation-update-data release; falling back to legacy weekly-reference-data." >&2
            PRIOR_RELEASE="weekly-reference-data"
            PRIOR_MANIFEST="weekly-reference-latest-us.json"
            gh release download "$PRIOR_RELEASE" \
              --repo "${{ github.repository }}" \
              --pattern "$PRIOR_MANIFEST" \
              --dir /tmp/prior-foundation \
              --clobber
          fi
          PRIOR_MANIFEST_PATH="/tmp/prior-foundation/${PRIOR_MANIFEST}"
          export PRIOR_MANIFEST_PATH
          PRIOR_BUNDLE_ASSET_NAME="$(python - <<'PY'
          import json, os
          from pathlib import Path
          manifest = json.loads(Path(os.environ['PRIOR_MANIFEST_PATH']).read_text(encoding='utf-8'))
          if manifest.get('market') != 'US':
              raise SystemExit(f"prior foundation market must be US, got {manifest.get('market')!r}")
          print(manifest['bundle_asset_name'])
          PY
          )"
          gh release download "$PRIOR_RELEASE" \
            --repo "${{ github.repository }}" \
            --pattern "$PRIOR_BUNDLE_ASSET_NAME" \
            --dir /tmp/prior-foundation \
            --clobber
          echo "PRIOR_FOUNDATION=/tmp/prior-foundation/${PRIOR_BUNDLE_ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Build foundation update artifact
        run: |
          set -euo pipefail
          args=(
            --optionable-symbols "$OPTIONABLE_SYMBOLS"
            --output-dir /tmp/foundation-update
            --stale-days 7
            --batch-sleep-seconds 0.15
            --min-symbol-coverage 0.98
            --min-identity-coverage 0.95
            --min-market-cap-coverage 0.50
          )
          if [ -n "${PRIOR_FOUNDATION:-}" ]; then
            args+=(--prior-foundation "$PRIOR_FOUNDATION")
          fi
          cd backend
          python -m app.scripts.build_foundation_update_artifact "${args[@]}"

      - name: Validate foundation update outputs
        run: |
          set -euo pipefail
          test -s /tmp/foundation-update/foundation-update-latest-us.json
          bundle="$(find /tmp/foundation-update -maxdepth 1 -name 'foundation-update-us-*.json.gz' | head -n 1)"
          if [ -z "$bundle" ] || [ ! -s "$bundle" ]; then
            echo "Missing foundation update bundle" >&2
            exit 1
          fi
          BUNDLE_PATH="$bundle" python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          manifest = json.loads(Path('/tmp/foundation-update/foundation-update-latest-us.json').read_text(encoding='utf-8'))
          if manifest.get('schema_version') != 'foundation-update-manifest-v1':
              raise SystemExit(f"bad schema: {manifest.get('schema_version')}")
          if manifest.get('market') != 'US':
              raise SystemExit(f"market must be US, got {manifest.get('market')!r}")
          sha256 = hashlib.sha256(Path(os.environ['BUNDLE_PATH']).read_bytes()).hexdigest()
          if sha256 != manifest.get('sha256'):
              raise SystemExit(f"foundation bundle sha256 mismatch: {sha256} != {manifest.get('sha256')}")
          if int(manifest.get('symbol_count') or 0) < 3000:
              raise SystemExit(f"symbol_count too low: {manifest.get('symbol_count')}")
          if float(manifest.get('symbol_coverage') or 0) < 0.98:
              raise SystemExit(f"symbol coverage too low: {manifest.get('symbol_coverage')}")
          field_coverage = manifest.get('field_coverage') or {}
          hard = {
              'company_name': 0.95,
              'exchange': 0.95,
              'market_cap': 0.50,
          }
          low = {field: field_coverage.get(field) for field, minimum in hard.items() if float(field_coverage.get(field) or 0) < minimum}
          if low:
              raise SystemExit(f"foundation field coverage below gate: {low}")
          print({
              'symbol_count': manifest.get('symbol_count'),
              'symbol_coverage': manifest.get('symbol_coverage'),
              'fetched_symbol_count': manifest.get('fetched_symbol_count'),
              'field_coverage': {k: field_coverage.get(k) for k in ['company_name', 'exchange', 'sector', 'industry', 'market_cap', 'beta', 'eps_growth_qq', 'sales_growth_qq']},
          })
          PY

      - name: Upload foundation update assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bundle="$(find /tmp/foundation-update -maxdepth 1 -name 'foundation-update-us-*.json.gz' | head -n 1)"
          gh release upload foundation-update-data "$bundle" \
            --repo "${{ github.repository }}" \
            --clobber
          gh release upload foundation-update-data /tmp/foundation-update/foundation-update-latest-us.json \
            --repo "${{ github.repository }}" \
            --clobber
