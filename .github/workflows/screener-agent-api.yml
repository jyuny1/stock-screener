name: Screener Agent API

on:
  workflow_dispatch:

concurrency:
  group: screener-agent-api
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-deploy:
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/screener-agent-api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SCREENER_AGENT_API_TOKEN: ${{ secrets.SCREENER_AGENT_API_TOKEN }}
      R2_BUCKET: ${{ vars.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/screener-agent-api/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate deployment settings
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID R2_BUCKET SCREENER_AGENT_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required deployment setting: ${name}" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Configure R2 bucket binding
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          import os
          path = Path('wrangler.jsonc')
          raw = path.read_text(encoding='utf-8')
          raw = raw.replace('replace-with-r2-bucket', os.environ['R2_BUCKET'])
          raw = raw.replace(
              '  "name": "stock-screener-agent-api",',
              '  "name": "stock-screener-agent-api",\n  "account_id": "' + os.environ['CLOUDFLARE_ACCOUNT_ID'] + '",',
          )
          path.write_text(raw, encoding='utf-8')
          PY

      - name: Deploy Worker
        run: npx wrangler deploy

      - name: Configure agent bearer token secret
        run: printf '%s' "$SCREENER_AGENT_API_TOKEN" | npx wrangler secret put SCREENER_AGENT_API_TOKEN
